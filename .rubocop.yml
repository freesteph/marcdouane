AllCops:
  TargetRubyVersion: 4.0
  NewCops: enable

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/GuardClause:
  Enabled: false

IfUnlessModifier:
  Enabled: false

Metrics/MethodLength:
  AllowedMethods:
    - check! # the rule checks are bound to be lengthy
